name: Build Compatible AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # <--- This ensures Steam Deck compatibility

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller psutil PySide6-Essentials

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed Source/mangomanager.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MangoManager-Linux-Binary
          path: dist/mangomanager
